<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />

        <!-- Fallback SEO meta tags (overridden by SEOHead component at runtime) -->
        <meta name="description" content="Create professional, ATS-optimized resumes with AI-powered text refinement and LaTeX-quality PDF export." />
        <meta name="keywords" content="resume builder, CV maker, AI resume, professional resume, ATS optimization" />

        <!-- Open Graph meta tags -->
        <meta property="og:title" content="CVCraft - AI-Powered Resume Builder" />
        <meta property="og:description" content="Create professional, ATS-optimized resumes with AI-powered text refinement and LaTeX-quality PDF export." />
        <meta property="og:image" content="https://cvcraft.app/og-image.png" />
        <meta property="og:url" content="https://cvcraft.app" />
        <meta property="og:type" content="website" />

        <!-- Twitter Card meta tags -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="CVCraft - AI-Powered Resume Builder" />
        <meta name="twitter:description" content="Create professional, ATS-optimized resumes with AI-powered text refinement and LaTeX-quality PDF export." />
        <meta name="twitter:image" content="https://cvcraft.app/og-image.png" />

        <title>CVCraft - AI-Powered Resume Builder</title>

        <!-- Google Analytics 4: only loads if REACT_APP_GA4_ID is set at build time -->
        <script>
            (function() {
                var gaId = '%REACT_APP_GA4_ID%';
                // CRA replaces %REACT_APP_GA4_ID% with the actual value at build time.
                // If not set, it remains as the literal placeholder string.
                if (!gaId || gaId === '' || gaId.indexOf('REACT_APP_GA4_ID') !== -1) return;

                var script = document.createElement('script');
                script.async = true;
                script.src = 'https://www.googletagmanager.com/gtag/js?id=' + gaId;
                document.head.appendChild(script);

                window.dataLayer = window.dataLayer || [];
                window.gtag = function() { window.dataLayer.push(arguments); };
                window.gtag('js', new Date());
                window.gtag('config', gaId);
            })();
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
